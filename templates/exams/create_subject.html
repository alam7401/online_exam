{% extends 'base.html' %}
{% block title %}Create Subject{% endblock %}
{% block content %}
<div class="container">
  <div class="page-header"><h1>Create Subject</h1></div>
  <div style="max-width:500px">
    <div class="card">
      <form method="post">
        {% csrf_token %}
        <div class="form-group">
          <label class="form-label">Subject Name</label>
          <input type="text" name="name" class="form-control" placeholder="e.g. Mathematics" required>
        </div>
        <div class="form-group">
          <label class="form-label">Subject Code</label>
          <input type="text" name="code" class="form-control" placeholder="e.g. MATH101" required>
        </div>
        <div style="display:flex;gap:.7rem">
          <button type="submit" class="btn btn-primary">Create Subject</button>
          <a href="{% url 'teacher_dashboard' %}" class="btn btn-ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
